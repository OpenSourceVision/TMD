name: Android CI & Auto Release

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: '选择构建类型 (debug / release)'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
      manual_version:
        description: '手动指定版本号 (例如 1.2。留空则自动从 1.0 开始，每次构建自动递增 0.1)'
        required: false
        default: ''
        type: string
      release_notes:
        description: '更新说明 (发布日志)'
        required: false
        default: '极简 Markdown 预览器 TMD 自动构建发布'
        type: string

jobs:
  build:
    name: Build & Release Android App
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必需权限：用于创建 Release 并上传资源文件

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整历史以确保能正确获取到 git tags

      - name: Calculate Version Tag
        id: calc_version
        run: |
          # 获取所有远程 tags
          git fetch --tags --force || true
          
          # 如果手动指定了版本号，优先使用
          if [ -n "${{ github.event.inputs.manual_version }}" ]; then
            NEXT_VERSION="${{ github.event.inputs.manual_version }}"
            echo "Using manually specified version: $NEXT_VERSION"
          else
            # 查找最新符合 vX.Y 格式的 tag
            LATEST_TAG=$(git tag -l "v[0-9]*.[0-9]*" | sort -V | tail -n 1)
            echo "Latest tag found: $LATEST_TAG"
            
            if [ -z "$LATEST_TAG" ]; then
              NEXT_VERSION="1.0"
            else
              # 移去前缀 v
              CLEAN_VERSION=${LATEST_TAG#v}
              # 使用 awk 进行高精度小数加法并格式化为 1 位小数
              NEXT_VERSION=$(echo "$CLEAN_VERSION" | awk '{printf "%.1f\n", $1 + 0.1}')
            fi
          fi
          
          NEXT_TAG="v$NEXT_VERSION"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$NEXT_TAG" >> $GITHUB_OUTPUT
          echo "Calculated next version: $NEXT_VERSION ($NEXT_TAG)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # 准备签名密钥：优先使用用户配置的 Secrets 证书，如果没有则使用内置的默认 debug.keystore，保持签名一致并避免动态临时证书导致安装冲突
      - name: Prepare Signing Keystore
        id: keystore_setup
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "Using KEYSTORE_BASE64 secret for release build."
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --d            echo "No KEYSTORE_BASE64 secret found. Using embedded debug.keystore to keep signature 100% consistent."
            # 内置的 debug.keystore Base64 编码，确保在 GitHub 仓库没有该文件时也能成功构建且签名一致
            echo "" | base64 --decode > debug." | base64 --decode > debug.keystore
            echo "Decoded embedded debug.keystore."
            echo "keystore_path=${{ github.workspace }}/debug.keystore" >> $GITHUB_OUTPUT
            echo "store_password=android" >> $GITHUB_OUTPUT
            echo "key_password=android" >> $GITHUB_OUTPUT
            echo "key_alias=androiddebugkey" >> $GITHUB_OUTPUT
          fi

      - name: Build Android App
        env:
          KEYSTORE_PATH: ${{ steps.keystore_setup.outputs.keystore_path }}
          STORE_PASSWORD: ${{ steps.keystore_setup.outputs.store_password }}
          KEY_PASSWORD: ${{ steps.keystore_setup.outputs.key_password }}
          KEY_ALIAS: ${{ steps.keystore_setup.outputs.key_alias }}
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            gradle :app:assembleRelease
          else
            gradle :app:assembleDebug
          fi

      - name: Find and Prepare Build Artifacts
        id: artifacts
        run: |
          if [ "${{ github.event.inputs.build_type }}" = "release" ]; then
            APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -n 1)
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          else
            APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -n 1)
            echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
            echo "apk_name=$(basename $APK_PATH)" >> $GITHUB_OUTPUT
          fi
          echo "Found APK at: $APK_PATH"

      # 自动创建 GitHub Release 并上传 APK 包，同时在 GitHub 上自动创建对应的 tag
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.calc_version.outputs.tag }}
          name: "TMD v${{ steps.calc_version.outputs.version }} (${{ github.event.inputs.build_type }})"
          body: |
            ## TMD Markdown 预览与阅读器 🚀
            
            ${{ github.event.inputs.release_notes }}
            
            - **构建版本**: v${{ steps.calc_version.outputs.version }}
            - **构建类型**: ${{ github.event.inputs.build_type }}
            - **构建时间**: ${{ github.event.repository.updated_at }}
          draft: false
          prerelease: false
          files: ${{ steps.artifacts.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

